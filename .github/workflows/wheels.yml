name: PyPI

on:
  push:
    branches: [main, dev, maint/*]
    tags: ['*']
  pull_request:
    branches: [main, dev, maint/*]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOSX_DEPLOYMENT_TARGET: '12.0'

defaults:
  run:
    shell: bash

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-slim
    permissions:
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2
        with:
          attest-build-provenance-github: ${{ github.event_name != 'pull_request' }}
          skip-wheel: true

  wheel:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [sdist]
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-15-intel
          - macos-latest
      fail-fast: false
    continue-on-error: true

    permissions:
      attestations: write
      id-token: write

    steps:
      - name: Download sdist
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: Packages
          path: dist

      - name: Unpack sdist
        run: |
          tar --strip-components=1 -xzvf dist/*.tar.gz
          rm -r dist

      - name: Build wheel from sdist
        uses: pypa/cibuildwheel@63fd63b352a9a8bdcc24791c9dbee952ee9a8abc # v3.3

      - name: Generate artifact attestation for wheels
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: "wheelhouse/bids_validator_deno-*.whl"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: wheel-${{ matrix.os }}
          path: ./wheelhouse

  test-wheel:
    name: Test wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [wheel]
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-15-intel
          - macos-latest
      fail-fast: false

    steps:
      - name: Check out repository (with bids-examples submodule)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: true

      - name: Download wheel for this platform
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheel-${{ matrix.os }}
          path: wheelhouse

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          activate-environment: true
          python-version: '3'

      - name: Install the wheel into a clean environment
        run: |
          uv pip install wheelhouse/*.whl

      - name: Expose a `bids-validator` shim forwarding to bids-validator-deno
        run: |
          mkdir -p .shim
          echo -e '#!/usr/bin/env bash\nexec bids-validator-deno "$@"' > .shim/bids-validator
          chmod +x .shim/bids-validator
          echo "$PWD/.shim" >> "$GITHUB_PATH"

      - name: Show validator version
        run: bids-validator --version

      - name: Validate bids-examples via run_tests.sh
        working-directory: tests/data/bids-examples
        run: bash run_tests.sh

  test-publish:
    name: Publish to test.pypi.org
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [wheel]
    permissions:
      id-token: write

    steps:
      - name: Download sdist
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: Packages
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: wheel-*
          path: dist

      - run: |
          mv dist/*/* dist/
          rmdir dist/*/

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish:
    name: Publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: [wheel]
    permissions:
      id-token: write

    steps:
      - name: Download sdist
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: Packages
          path: dist

      - name: Download wheels
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: wheel-*
          path: dist

      - run: |
          mv dist/*/* dist/
          rmdir dist/*/

      - name: Upload package to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
